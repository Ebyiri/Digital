name: Package Digital Standalone EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build-windows:
    runs-on: windows-latest 

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Download Latest Digital Jar
      shell: bash
      run: |
        # Hardcoded to the definitive API URL to prevent string parsing bugs
        LATEST_URL="https://github.com"
        DOWNLOAD_URL=$(curl -s "$LATEST_URL" | grep "browser_download_url.*Digital.zip" | cut -d '"' -f 4)
        
        echo "Downloading from: $DOWNLOAD_URL"
        curl -L -o Digital.zip "$DOWNLOAD_URL"
        
        # Unzip using PowerShell
        powershell Expand-Archive -Path Digital.zip -DestinationPath . -Force
        
        # Verify and move the jar file cleanly
        mv Digital/Digital.jar .

    - name: Build Standalone EXE Installer via jpackage
      shell: bash
      run: |
        jpackage \
          --type msi \
          --dest output_installer \
          --name "DigitalLogicSimulator" \
          --input . \
          --main-jar Digital.jar \
          --main-class de.neemann.digital.gui.Main \
          --win-dir-chooser \
          --win-shortcut \
          --win-menu

    - name: Upload Standalone Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Digital-Windows-Installer
        path: output_installer/
