name: Package Digital Standalone EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to manually trigger the build

jobs:
  build-windows:
    runs-on: windows-latest # Runs on a clean Windows cloud machine

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Download Latest Digital Jar
      shell: bash
      run: |
        # Pulls the latest release version dynamically from HNeemann's repository
        LATEST_URL=$(curl -s https://github.com | grep "browser_download_url.*Digital.zip" | cut -d '"' -f 4)
        curl -L -o Digital.zip "$LATEST_URL"
        unzip Digital.zip
        mv Digital/Digital.jar .

    - name: Build Standalone EXE Installer via jpackage
      shell: bash
      run: |
        # Creates an MSI installer/EXE package bundling a stripped-down runtime
        jpackage \
          --type msi \
          --dest output_installer \
          --name "DigitalLogicSimulator" \
          --input . \
          --main-jar Digital.jar \
          --main-class de.neemann.digital.gui.Main \
          --win-dir-chooser \
          --win-shortcut \
          --win-menu

    - name: Upload Standalone Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Digital-Windows-Installer
        path: output_installer/
