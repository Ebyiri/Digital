name: Package Digital Standalone EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build-windows:
    runs-on: windows-latest 

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Download Digital Release Asset
      uses: robinraju/release-downloader@v1.11
      with:
        repository: "hneemann/Digital"
        latest: true
        fileName: "Digital.zip"

    - name: Extract Jar File
      shell: bash
      run: |
        # Use native powershell to extract the downloaded file cleanly
        powershell Expand-Archive -Path Digital.zip -DestinationPath . -Force
        mv Digital/Digital.jar .

    - name: Build Standalone EXE Installer via jpackage
      shell: bash
      run: |
        jpackage \
          --type msi \
          --dest output_installer \
          --name "DigitalLogicSimulator" \
          --input . \
          --main-jar Digital.jar \
          --main-class de.neemann.digital.gui.Main \
          --win-dir-chooser \
          --win-shortcut \
          --win-menu

    - name: Upload Standalone Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Digital-Windows-Installer
        path: output_installer/
