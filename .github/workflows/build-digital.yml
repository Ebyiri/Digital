name: Build Single Portable EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build-standalone-exe:
    runs-on: windows-latest 

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Download Digital Release Asset
      uses: robinraju/release-downloader@v1.11
      with:
        repository: "hneemann/Digital"
        latest: true
        fileName: "Digital.zip"

    - name: Extract Jar File
      shell: bash
      run: |
        powershell Expand-Archive -Path Digital.zip -DestinationPath . -Force
        mv Digital/Digital.jar .

    - name: Generate Portable App Image Structure
      shell: bash
      run: |
        # Create a short root directory to bypass Windows 32000 character limits
        mkdir -p /c/p_dir/out
        
        # Use an absolute short path for --dest and --temp
        jpackage \
          --type app-image \
          --dest "C:/p_dir/out" \
          --temp "C:/p_dir/temp" \
          --name "DigitalApp" \
          --input . \
          --main-jar Digital.jar \
          --main-class de.neemann.digital.gui.Main

    - name: Compress Everything into a Single Portable EXE
      shell: bash
      run: |
        # Download the precise Windows binary name from warp releases page
        curl -LO https://github.com
        chmod +x windows-x64.warp-packer.exe
        
        # Package the directory directly out of the short C:/p_dir path
        ./windows-x64.warp-packer.exe \
          --arch windows-x64 \
          --input_dir "C:/p_dir/out/DigitalApp" \
          --exec DigitalApp.exe \
          --output Digital.exe

    - name: Upload Single Standalone EXE
      uses: actions/upload-artifact@v4
      with:
        name: Standalone-Digital-EXE
        path: Digital.exe
