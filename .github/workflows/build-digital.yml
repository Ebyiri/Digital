name: Build Single Portable EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build-standalone-exe:
    runs-on: windows-latest 

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Download Digital Release Asset
      uses: robinraju/release-downloader@v1.11
      with:
        repository: "hneemann/Digital"
        latest: true
        fileName: "Digital.zip"

    - name: Extract Jar File
      shell: bash
      run: |
        powershell Expand-Archive -Path Digital.zip -DestinationPath . -Force
        mv Digital/Digital.jar .

    - name: Generate Portable App Image Structure
      shell: bash
      run: |
        # Generates a native application folder structure with bundled JRE
        jpackage \
          --type app-image \
          --dest portable_dir \
          --name "DigitalApp" \
          --input . \
          --main-jar Digital.jar \
          --main-class de.neemann.digital.gui.Main

    - name: Compress Everything into a Single Portable EXE
      shell: bash
      run: |
        # Download warp-packer tool to fuse the directory into one binary executable
        curl -LO https://github.com
        
        # Package the entire generated app directory into one standalone file
        ./warp-packer-x86_64-windows.exe \
          --arch windows-x64 \
          --input_dir portable_dir/DigitalApp \
          --exec DigitalApp.exe \
          --output Digital.exe

    - name: Upload Single Standalone EXE
      uses: actions/upload-artifact@v4
      with:
        name: Standalone-Digital-EXE
        path: Digital.exe
